# CI cho main + mọi PR vào main. Hai job độc lập (backend/frontend) chạy song song
# — thay đổi một bên vẫn build cả hai để giữ bất biến "main luôn build pass" (docs/02 §2).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Push mới lên cùng nhánh PR thì hủy lượt chạy cũ — đỡ tốn phút runner cho commit đã lỗi thời.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven test)
    runs-on: ubuntu-latest # runner Linux có sẵn Docker daemon — Testcontainers cần nó để kéo postgres:18-alpine
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven # cache ~/.m2/repository theo hash của pom.xml
          cache-dependency-path: src/backend/pom.xml

      # -B (batch mode): tắt output tương tác/progress bar cho log CI gọn
      - name: Run tests
        run: ./mvnw -B test

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # khớp node:22-alpine trong Dockerfile
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      # npm ci (không phải npm install): cài đúng theo package-lock.json, fail nếu lock lệch — build tái lập được
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # next build chạy cả type-check (tsc) — frontend chưa có unit test, đây là gate chính
      - name: Build
        run: npm run build
